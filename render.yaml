# Render Blueprint — True AML (Hobby plan)
# https://render.com/docs/blueprint-spec

databases:
  - name: true-aml-db
    databaseName: true_aml
    plan: free  # актуальный план

services:
  # Backend API (Node + Express + Prisma)
  - type: web
    runtime: node
    name: true-aml-backend
    rootDir: backend
    plan: starter

    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: true-aml-db
          property: connectionString
      - key: TRONGRID_API_KEY
        sync: false
      - key: TRONSCAN_API_KEY
        sync: false
      - key: BLOCKCHAIN_PROVIDER
        value: tronscan
      - key: API_KEY
        sync: false

  # Frontend (Next.js)
  - type: web
    runtime: node
    name: true-aml-frontend
    rootDir: frontend
    plan: starter

    buildCommand: npm ci && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      # URL бэкенда — после первого деплоя будет https://true-aml-backend.onrender.com
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://true-aml-backend.onrender.com
