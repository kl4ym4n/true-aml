version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: true-aml-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-true_aml}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aml-network-dev

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: true-aml-app-dev
    environment:
      NODE_ENV: development
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-true_aml}?schema=public
      TRONGRID_API_KEY: ${TRONGRID_API_KEY}
      TRONSCAN_API_KEY: ${TRONSCAN_API_KEY:-}
      BLOCKCHAIN_PROVIDER: ${BLOCKCHAIN_PROVIDER:-auto}
      API_KEY: ${API_KEY:-}
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      # Mount source code for hot reload
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./data:/app/data
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      # Exclude node_modules from volume mount
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aml-network-dev

volumes:
  postgres_data_dev:

networks:
  aml-network-dev:
    driver: bridge

