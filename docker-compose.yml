version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: true-aml-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-true_aml}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aml-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: true-aml-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-true_aml}?schema=public
      TRONGRID_API_KEY: ${TRONGRID_API_KEY}
      TRONSCAN_API_KEY: ${TRONSCAN_API_KEY:-}
      BLOCKCHAIN_PROVIDER: ${BLOCKCHAIN_PROVIDER:-auto}
      API_KEY: ${API_KEY:-}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/index.js"
    restart: unless-stopped
    networks:
      - aml-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
    container_name: true-aml-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
      PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - aml-network

volumes:
  postgres_data:

networks:
  aml-network:
    driver: bridge

